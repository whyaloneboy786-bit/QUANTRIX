          GL_TOKEN: ${{ secrets.GL_TOKEN }}
          GL_PROJECT_ID: ${{ secrets.GL_PROJECT_ID }}
        run: |
          Write-Host "вҡЎ QUANTUM PULSE TRIGGERED..." -ForegroundColor Yellow
          powershell.exe -ExecutionPolicy Bypass -File ".\Quantrix-Core.ps1"
