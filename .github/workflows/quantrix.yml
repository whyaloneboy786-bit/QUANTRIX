          $CoreUrl = "https://gitlab.com/api/v4/projects/$env:GL_PROJECT_ID/repository/files/Quantrix-Core.ps1/raw?ref=main"
          
          try {
            Invoke-WebRequest -Uri $CoreUrl -Headers @{ "PRIVATE-TOKEN" = "$env:GL_TOKEN" } -OutFile "Quantrix-Core.ps1"
