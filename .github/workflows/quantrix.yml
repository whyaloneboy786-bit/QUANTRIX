      - name: рҹ§¬ Establishing Neural Link (GitLab)
        env:
          GL_TOKEN: ${{ secrets.GL_TOKEN }}
          GL_PROJECT_ID: ${{ secrets.GL_PROJECT_ID }}
        run: |
          Write-Host "рҹ“Ў Downloading Core Logic from Matrix Vault..." -ForegroundColor Cyan
